name: ubuntu-netbench
version: "0.1"
base: bare
build-base: ubuntu@24.04
summary: Bootable Ubuntu benchmark image with iperf3 and curl preinstalled
description: |
  Experimental benchmark image for rally-ci-churn. This recipe builds a simple
  bootable Ubuntu image for OpenStack with the runtime packages needed by the
  network benchmark controller, server, and client roles.

platforms:
  amd64:

volumes:
  pc:
    schema: gpt
    structure:
      - name: efi
        type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        filesystem: vfat
        role: system-boot
        filesystem-label: UEFI
        size: 128M
      - name: rootfs
        type: 0FC63DAF-8483-4772-8E79-3D69D8477DE4
        filesystem: ext4
        filesystem-label: writable
        role: system-data
        size: 2G

filesystems:
  default:
    - mount: /
      device: "(volume/pc/rootfs)"
    - mount: /boot/efi/
      device: "(volume/pc/efi)"

parts:
  rootfs:
    plugin: nil
    build-packages:
      - mmdebstrap
    override-build: |
      mmdebstrap --arch "$CRAFT_ARCH_BUILD_FOR" \
        --mode=sudo \
        --format=dir \
        --variant=minbase \
        --components=main,universe \
        --include=apt \
        noble \
        "$CRAFT_PART_INSTALL/" \
        http://archive.ubuntu.com/ubuntu/
      rm -r "$CRAFT_PART_INSTALL/dev/"*
      mkdir -p "$CRAFT_PART_INSTALL/boot/efi"
    organize:
      "*": "(overlay)/"

  packages:
    plugin: nil
    overlay-packages:
      - ubuntu-server-minimal
      - grub2-common
      - grub-pc
      - shim-signed
      - linux-image-generic
      - cloud-init
      - python3
      - ca-certificates
      - openssh-server
      - curl
      - iperf3
    overlay-script: |
      rm -f "$CRAFT_OVERLAY/etc/cloud/cloud.cfg.d/90_dpkg.cfg"
      rm -f "$CRAFT_OVERLAY/etc/resolv.conf"
      ln -s /run/systemd/resolve/stub-resolv.conf "$CRAFT_OVERLAY/etc/resolv.conf"

  fstab:
    plugin: nil
    after: [packages]
    overlay-script: |
      cat <<'EOF' > "$CRAFT_OVERLAY/etc/fstab"
      LABEL=writable / ext4 discard,errors=remount-ro 0 1
      LABEL=UEFI /boot/efi vfat umask=0077 0 1
      EOF

  serial-console:
    plugin: nil
    after: [packages]
    overlay-script: |
      mkdir -p "$CRAFT_OVERLAY/etc/default/grub.d"
      cat > "$CRAFT_OVERLAY/etc/default/grub.d/50-rally-ci-churn.cfg" <<'EOF'
      GRUB_TERMINAL="console serial"
      GRUB_SERIAL_COMMAND="serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1"
      GRUB_CMDLINE_LINUX="console=tty0 console=ttyS0,115200n8 systemd.journald.forward_to_console=1"
      GRUB_CMDLINE_LINUX_DEFAULT=""
      EOF

      mkdir -p "$CRAFT_OVERLAY/etc/systemd/system/getty.target.wants"
      ln -sf /lib/systemd/system/serial-getty@.service \
        "$CRAFT_OVERLAY/etc/systemd/system/getty.target.wants/serial-getty@ttyS0.service"
